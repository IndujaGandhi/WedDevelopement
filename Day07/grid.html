<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Boxs</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .box {
            padding: 20px;
            background-color: #71c5f2;
            border: 1px solid #0d30f5;
            text-align: center;
        }
        .header {
            grid-column: span 3;
        }
        .sidebar {
            grid-column: span 1;
        }
        .content {
            grid-column: span 2;
        }
        .footer {
            grid-column: span 3;
        }
        </style>
</head>
<body>
    <div class="container">
        <div class="box header">Header (3 columns)</div>
        <div class="box sidebar">Sidebar (1 column)</div>
        <div class="box content">Content (2 columns)</div>  
        <div class="box footer">Footer (3 columns)</div>
    </div>
</body>
</html>
